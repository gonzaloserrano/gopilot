name: Skill Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and run skill-check
        run: |
          npm install -g skill-check@latest
          skill-check check --format github
