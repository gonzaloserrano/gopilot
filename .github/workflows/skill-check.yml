name: Skill Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run skill-check
        run: npx skill-check@latest --format github .
